name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: Server/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Client/tauri-client/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: Client/tauri-client/src-tauri

      - name: Extract version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build server
        shell: bash
        run: cd Server && go build -o chatserver.exe -ldflags "-s -w -X main.version=$VERSION" .

      - name: Install npm dependencies
        working-directory: Client/tauri-client
        run: npm ci

      - name: Detect updater signing config
        id: signing
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ] && [ -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Updater signing secrets are missing; falling back to unsigned installer build."
          fi

      - name: Build Tauri app (signed)
        id: tauri_signed
        if: steps.signing.outputs.enabled == 'true'
        continue-on-error: true
        working-directory: Client/tauri-client
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Disable updater artifacts for fallback build
        if: steps.signing.outputs.enabled != 'true' || steps.tauri_signed.outcome == 'failure'
        shell: pwsh
        run: |
          $path = "Client/tauri-client/src-tauri/tauri.conf.json"
          $json = Get-Content $path -Raw | ConvertFrom-Json
          $json.bundle.createUpdaterArtifacts = $false
          $json | ConvertTo-Json -Depth 100 | Set-Content $path -Encoding utf8
          Write-Host "Disabled updater artifacts for unsigned release build."

      - name: Build Tauri app (unsigned fallback)
        if: steps.signing.outputs.enabled != 'true' || steps.tauri_signed.outcome == 'failure'
        working-directory: Client/tauri-client
        run: npm run tauri build

      - name: Locate artifacts
        id: artifacts
        shell: bash
        run: |
          NSIS_DIR="Client/tauri-client/src-tauri/target/release/bundle/nsis"
          INSTALLER=$(find "$NSIS_DIR" -name "*.exe" | head -1)
          CLIENT_EXE="Client/tauri-client/src-tauri/target/release/rylo-client.exe"
          echo "installer_path=$INSTALLER" >> "$GITHUB_OUTPUT"
          echo "installer_name=$(basename $INSTALLER)" >> "$GITHUB_OUTPUT"
          echo "client_exe_path=$CLIENT_EXE" >> "$GITHUB_OUTPUT"
          echo "client_exe_name=$(basename $CLIENT_EXE)" >> "$GITHUB_OUTPUT"
          # Updater artifacts (produced when TAURI_SIGNING_PRIVATE_KEY is set)
          NSIS_ZIP=$(find "$NSIS_DIR" -name "*_x64-setup.nsis.zip" ! -name "*.sig" | head -1)
          NSIS_SIG=$(find "$NSIS_DIR" -name "*_x64-setup.nsis.zip.sig" | head -1)
          echo "nsis_zip=${NSIS_ZIP:-}" >> "$GITHUB_OUTPUT"
          echo "nsis_sig=${NSIS_SIG:-}" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $lines = @()
          $serverHash = (Get-FileHash -Path Server/chatserver.exe -Algorithm SHA256).Hash.ToLower()
          $lines += "$serverHash  chatserver.exe"
          $clientExePath = "${{ steps.artifacts.outputs.client_exe_path }}"
          $clientExeName = "${{ steps.artifacts.outputs.client_exe_name }}"
          $clientExeHash = (Get-FileHash -Path $clientExePath -Algorithm SHA256).Hash.ToLower()
          $lines += "$clientExeHash  $clientExeName"
          $installerPath = "${{ steps.artifacts.outputs.installer_path }}"
          $installerName = "${{ steps.artifacts.outputs.installer_name }}"
          $installerHash = (Get-FileHash -Path $installerPath -Algorithm SHA256).Hash.ToLower()
          $lines += "$installerHash  $installerName"
          $nsisZip = "${{ steps.artifacts.outputs.nsis_zip }}"
          if ($nsisZip -and (Test-Path $nsisZip)) {
            $zipName = Split-Path $nsisZip -Leaf
            $zipHash = (Get-FileHash -Path $nsisZip -Algorithm SHA256).Hash.ToLower()
            $lines += "$zipHash  $zipName"
          }
          $lines -join "`n" | Out-File -FilePath checksums.sha256 -Encoding utf8 -NoNewline

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          ASSETS=(
            Server/chatserver.exe
            "${{ steps.artifacts.outputs.client_exe_path }}"
            "${{ steps.artifacts.outputs.installer_path }}"
            checksums.sha256
          )
          # Include updater artifacts if signing key was available
          if [ -n "${{ steps.artifacts.outputs.nsis_zip }}" ]; then
            ASSETS+=("${{ steps.artifacts.outputs.nsis_zip }}")
          fi
          if [ -n "${{ steps.artifacts.outputs.nsis_sig }}" ]; then
            ASSETS+=("${{ steps.artifacts.outputs.nsis_sig }}")
          fi
          gh release create ${{ github.ref_name }} \
            --generate-notes \
            "${ASSETS[@]}"
